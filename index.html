<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vòng Quay May Mắn - StoPest Vietnam</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Khu vực hiển thị Logo thương hiệu phía trên -->
    <div class="brand-container">
        <img src="logo.png" alt="StoPest Logo" class="brand-logo" onerror="this.style.display='none'">
        <h1>STOPEST VIỆT NAM</h1>
        <p>Chương trình tri ân khách hàng</p>
    </div>

    <!-- Khung giao diện chính nằm giữa -->
    <div class="container">
        <h3>🎁 Vòng Quay May Mắn</h3>
        <p class="subtitle">Nhập thông tin để nhận 01 lượt quay và có cơ hội nhận ưu đãi hấp dẫn.</p>

        <!-- Hộp thông báo kết quả trúng thưởng -->
        <div id="result-box" class="hidden">
            <h2 id="status-message">Chúc mừng bạn!</h2>
            <div id="result-text"></div>
        </div>

        <!-- Form nhập liệu đặt trên vòng quay -->
        <div class="form-container">
            <div id="input-fields">
                <input type="text" id="fullname" placeholder="Họ và tên" required>
                <input type="tel" id="phone" placeholder="Số điện thoại" required>
            </div>
        </div>

        <!-- Khu vực vòng quay canvas tự vẽ sắc nét kèm kim chỉ tam giác đỏ -->
        <div class="wheel-container">
            <div class="pointer-triangle"></div>
            <canvas id="wheelCanvas" width="500" height="500"></canvas> 
        </div>

        <!-- Nút bấm thực hiện hành động quay -->
        <button id="spin-btn">QUAY NGAY</button>
    </div>

    <!-- Iframe ẩn giúp gửi dữ liệu mượt mà, không bị chặn link -->
    <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;"></iframe>

    <script src="script.js"></script>
</body>
</html>
