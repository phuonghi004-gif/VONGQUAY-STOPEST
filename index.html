<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vòng Quay May Mắn - StoPest Vietnam</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Logo thương hiệu nằm trên cùng -->
    <div class="brand-container">
        <h1>STOPEST VIỆT NAM</h1>
        <p>Chương trình tri ân khách hàng</p>
    </div>

    <div class="container">
        <h3>🎁 Vòng Quay May Mắn</h3>
        <p class="subtitle">Nhập thông tin để nhận 01 lượt quay và có cơ hội nhận ưu đãi hấp dẫn.</p>

        <!-- Khu vực hiển thị kết quả -->
        <div id="result-box" class="hidden">
            <h2 id="status-message">Chúc mừng bạn!</h2>
            <div id="result-text"></div>
        </div>

        <!-- Form nhập liệu -->
        <div class="form-container">
            <div id="input-fields">
                <input type="text" id="fullname" placeholder="Họ và tên" required>
                <input type="tel" id="phone" placeholder="Số điện thoại" required>
            </div>
        </div>

        <!-- Vòng quay tự vẽ sắc nét kèm kim chỉ đỉnh tam giác đỏ -->
        <div class="wheel-container">
            <div class="pointer-triangle"></div>
            <canvas id="wheelCanvas" width="500" height="500"></canvas> 
        </div>

        <!-- Nút bấm quay -->
        <button id="spin-btn">QUAY NGAY</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
