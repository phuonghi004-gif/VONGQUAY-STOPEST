<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vòng Quay May Mắn - StoPest Vietnam</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Khu vực hiển thị kết quả -->
        <div id="result-box" class="hidden">
            <h2 id="status-message">Chúc mừng bạn!</h2>
            <div id="result-text"></div>
        </div>

        <!-- Vòng quay -->
        <div class="wheel-container">
            <div class="pointer"></div>
            <!-- canvas chuẩn kích thước cho thuật toán vẽ 5 ô -->
            <canvas id="wheelCanvas" width="500" height="500"></canvas> 
        </div>

        <!-- Nút bấm và Form nhập liệu -->
        <div class="form-container">
            <div id="input-fields">
                <input type="text" id="fullname" placeholder="Họ và tên" required>
                <input type="tel" id="phone" placeholder="Số điện thoại" required>
            </div>
            <button id="spin-btn">QUAY NGAY</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
